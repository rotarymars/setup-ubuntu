---
- name: Add rotarymars to docker group
  become: true
  ansible.builtin.user:
    name: rotarymars
    groups: docker
    append: yes

- name: Add rotarymars to video group
  become: true
  ansible.builtin.user:
    name: rotarymars
    groups: video
    append: yes

- name: Add rotarymars to dialout group
  become: true
  ansible.builtin.user:
    name: rotarymars
    groups: dialout
    append: yes

- name: Add rotarymars to netdev group
  become: true
  ansible.builtin.user:
    name: rotarymars
    groups: netdev
    append: yes

- name: Add rotarymars to input group
  become: true
  ansible.builtin.user:
    name: rotarymars
    groups: input
    append: yes

- name: Replace capslock to ctrl
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/keyboard
    regexp: "^XKBOPTIONS="
    line: 'XKBOPTIONS="ctrl:nocaps"'

# - name: install lazygit
