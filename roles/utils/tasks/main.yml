- name: Add source .my-bashrc if not written
  ansible.builtin.lineinfile:
    path: ~/.bashrc
    line: "source ~/.my-bashrc"

- name: Copy .my-bashrc
  ansible.builtin.template:
    src: ".my-bashrc"
    dest: "~/.my-bashrc"

- name: Ensure .config/lazygit directory exists
  ansible.builtin.file:
    path: "~/.config/lazygit"
    state: directory
    mode: "0755"

- name: Copy lazygit's config.yml
  ansible.builtin.template:
    src: "lazygit_config.yml"
    dest: "~/.config/lazygit/config.yml"

- name: Copy tmux config
  ansible.builtin.template:
    src: ".tmux.conf"
    dest: "~/.tmux.conf"

- name: Ensure .zshrc exists
  ansible.builtin.file:
    path: ~/.zshrc
    state: touch
    mode: '0644'
    modification_time: preserve
    access_time: preserve

- name: Add source .my-zshrc if not written
  ansible.builtin.lineinfile:
    path: ~/.zshrc
    line: "source ~/.my-zshrc"

- name: Copy .my-zshrc
  ansible.builtin.template:
    src: ".my-zshrc"
    dest: "~/.my-zshrc"

- name: Copy .hotspot_config.zsh
  ansible.builtin.template:
    src: "hotspot_config.zsh"
    dest: "~/.hotspot_config.zsh"

- name: Copy .xprofile
  ansible.builtin.template:
    src: ".xprofile"
    dest: "~/.xprofile"

- name: Fetch neovim config
  ansible.builtin.git:
    repo: https://github.com/rotarymars/neovim-setup
    dest: "~/.config/nvim"
    update: yes

- name: Fetch atcoder-cli-template
  ansible.builtin.git:
    repo: https://github.com/rotarymars/atcoder-cli-template
    dest: "~/.config/atcoder-cli-nodejs/kyopuro"

- name: Add config for Apple's USB Superdrive
  become: true
  ansible.builtin.template:
    src: 60-apple-superdrive.rules
    dest: /etc/udev/rules.d/60-apple-superdrive.rules

- command: which delta
  register: result
  ignore_errors: true

- name: Install delta if needed
  ansible.builtin.shell: |
    aria2c 'https://github.com/dandavison/delta/releases/download/0.18.2/git-delta_0.18.2_amd64.deb'
    sudo dpkg -i ./git-delta_0.18.2_amd64.deb
    rm ./git-delta_0.18.2_amd64.deb
  when: result is failed

- name: Check if gh command exists and get its path
  ansible.builtin.command: which gh
  register: gh_check
  ignore_errors: true
  changed_when: false

- name: Setup GitHub CLI zsh completions
  become: true
  ansible.builtin.shell: |
    mkdir -p /usr/local/share/zsh/site-functions
    {{ gh_check.stdout }} completion -s zsh > /usr/local/share/zsh/site-functions/_gh
  args:
    creates: /usr/local/share/zsh/site-functions/_gh
  when: gh_check.rc == 0

- name: Install zinit
  ansible.builtin.shell: |
    bash -c "$(curl --fail --show-error --silent --location https://raw.githubusercontent.com/zdharma-continuum/zinit/HEAD/scripts/install.sh)"

- name: Check if fzf is installed
  ansible.builtin.stat:
    path: ~/.fzf
  register: fzf_check

- name: Install fzf from git
  ansible.builtin.shell: |
    git clone --depth 1 https://github.com/junegunn/fzf.git ~/.fzf
    ~/.fzf/install --all
  when: not fzf_check.stat.exists

- name: Configure ibus-mozc as default input method
  ansible.builtin.command: im-config -n ibus
  changed_when: false

- name: Disable KVM for VirtualBox
  become: true
  ansible.builtin.copy:
    dest: /etc/modprobe.d/blacklist-kvm.conf
    content: |
      blacklist kvm
      blacklist kvm_intel

- name: Check for Realtek wifi card
  ansible.builtin.shell: lspci | grep -i realtek | grep -i wireless
  register: realtek_check
  ignore_errors: true
  changed_when: false

- name: Add Thinkpad Realtek config
  become: true
  ansible.builtin.copy:
    dest: /etc/modprobe.d/30-rtw89.conf
    content: |
      options rtw89pci disable_aspm_l1=y
      options rtw89pci disable_aspm_l1ss=y
  when: realtek_check.rc == 0

- name: Freeze kernel at generic
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - linux-image-generic-hwe-24.04
    - linux-headers-generic-hwe-24.04

- name: Remove google-chrome.list if it exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/google-chrome.list
    state: absent

- name: Check if Copilot CLI is installed
  ansible.builtin.command: which copilot
  register: copilot_check
  ignore_errors: true
  changed_when: false

- name: Install Copilot CLI
  ansible.builtin.shell: curl -fsSL https://gh.io/copilot-install | bash
  when: copilot_check.rc != 0

- name: Check if Claude Code is installed
  ansible.builtin.command: which claude
  register: claude_check
  ignore_errors: true
  changed_when: false

- name: Install Claude Code
  ansible.builtin.shell: curl -fsSL https://claude.ai/install.sh | bash
  when: claude_check.rc != 0

- name: Clone Seeed-Studio/kicad-mcp-server
  ansible.builtin.git:
    repo: https://github.com/Seeed-Studio/kicad-mcp-server
    dest: ~/.local/share/kicad-mcp-server
    depth: 1
    update: yes
  register: kicad_mcp_clone

- name: Drop stale test_generation import from kicad-mcp-server
  ansible.builtin.lineinfile:
    path: ~/.local/share/kicad-mcp-server/src/kicad_mcp_server/server.py
    line: "    test_generation,"
    state: absent

- name: Install kicad-mcp-server into dedicated venv (editable)
  ansible.builtin.pip:
    name: ~/.local/share/kicad-mcp-server
    editable: true
    virtualenv: ~/.local/share/kicad-mcp-server/.venv
    virtualenv_command: python3 -m venv
    state: present

- name: Check if ~/.claude.json exists
  ansible.builtin.stat:
    path: ~/.claude.json
  register: claude_json_stat

- name: Load existing Claude config
  ansible.builtin.slurp:
    src: ~/.claude.json
  register: claude_json_raw
  when: claude_json_stat.stat.exists

- name: Merge kicad MCP server into Claude config
  vars:
    existing_config: "{{ (claude_json_raw.content | b64decode | from_json) if claude_json_stat.stat.exists else {} }}"
    existing_mcp: "{{ (existing_config.mcpServers | default({})) | dict2items | rejectattr('key', 'equalto', 'kicad-schematic') | list | items2dict }}"
    kicad_mcp:
      kicad:
        command: "{{ ansible_env.HOME }}/.local/share/kicad-mcp-server/.venv/bin/kicad-mcp-server"
        args: []
    merged_config: "{{ existing_config | combine({'mcpServers': existing_mcp | combine(kicad_mcp)}, recursive=True) }}"
  ansible.builtin.copy:
    content: "{{ merged_config | to_nice_json }}"
    dest: ~/.claude.json
    mode: '0600'

- name: Check if Ollama is installed
  ansible.builtin.command: which ollama
  register: ollama_check
  ignore_errors: true
  changed_when: false

- name: Install Ollama
  ansible.builtin.shell: curl -fsSL https://ollama.com/install.sh | sh
  when: ollama_check.rc != 0

- name: Check if PlatformIO is installed
  ansible.builtin.stat:
    path: ~/.platformio
  register: pio_check

- name: Install PlatformIO
  ansible.builtin.shell: |
    curl -fsSL -o get-platformio.py https://raw.githubusercontent.com/platformio/platformio-core-installer/master/get-platformio.py
    python3 get-platformio.py
    rm get-platformio.py
  when: not pio_check.stat.exists

- name: Check if gh-act extension is installed
  ansible.builtin.shell: gh extension list | grep -q nektos/gh-act
  register: gh_act_check
  ignore_errors: true
  changed_when: false

- name: Install gh-act extension
  ansible.builtin.command: gh extension install https://github.com/nektos/gh-act
  when: gh_act_check.rc != 0

- name: Check if Orca Slicer is installed via flatpak
  ansible.builtin.shell: flatpak list --user | grep -q com.orcaslicer.OrcaSlicer
  register: orca_check
  ignore_errors: true
  changed_when: false

- name: Install Orca Slicer via Flatpak
  ansible.builtin.command: flatpak install --user -y https://github.com/OrcaSlicer/OrcaSlicer/releases/download/v2.3.1/OrcaSlicer_v2.3.1_Linux.flatpak
  when: orca_check.rc != 0

- name: Set rustup default stable
  ansible.builtin.command: rustup default stable
  changed_when: false

- name: Install jj-cli via cargo
  ansible.builtin.command: cargo install --locked --bin jj jj-cli
  args:
    creates: ~/.cargo/bin/jj

