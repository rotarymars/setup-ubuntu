---
- name: Load variables
  ansible.builtin.include_vars:
    dir: vars/main
    extensions:
      - yml

- name: Set target roles
  ansible.builtin.set_fact:
    # target_roles: ["bluetooth_pan"]
    target_roles: ["apt-upgrade", "apt", "snap", "setup-git", "nerd-fonts", "utils", "asdf"]

- name: Ubuntu setup
  ansible.builtin.include_role:
    name: "{{ item }}"
  loop: "{{ target_roles }}"