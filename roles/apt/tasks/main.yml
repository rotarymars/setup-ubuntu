---
- name: Remove legacy antigravity sources list
  become: true
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/antigravity.list
    state: absent

- name: Remove legacy antigravity binary keyring
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings/antigravity-repo-key.gpg
    state: absent

- name: Install apt key
  become: true
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.keyname }}"
  loop: "{{ apt_keys }}"
- name: Install apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
  loop: "{{ apt_repositories }}"
- name: Install apt packages
  become: true
  ansible.builtin.apt:
    name: "{{ apt_packages }}"
    install_recommends: true
