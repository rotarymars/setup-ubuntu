---
- name: Check if i386 is enabled
  ansible.builtin.command: dpkg --print-foreign-architectures
  register: foreign_arch
  changed_when: false

- name: Add i386 architecture
  become: true
  ansible.builtin.command: dpkg --add-architecture i386
  when: "'i386' not in foreign_arch.stdout"
  register: i386_added

- name: Refresh apt cache after adding i386
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: i386_added is changed

- name: Ensure keyring directories exist
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /etc/apt/keyrings
    - /usr/share/keyrings

- name: Install apt key
  become: true
  ansible.builtin.shell: |
    set -o pipefail && curl -fsSL "{{ item.url }}" | gpg --dearmor --yes -o "{{ item.keyname }}"
  args:
    executable: /bin/bash
    creates: "{{ item.keyname }}"
  loop: "{{ apt_keys }}"
- name: Install apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
  loop: "{{ apt_repositories }}"
- name: Install apt packages
  become: true
  ansible.builtin.apt:
    name: "{{ apt_packages }}"
    install_recommends: true
